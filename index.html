<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ventas PRO</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10384/10384160.png">

    <style>
        :root {
            --bg: #000; --card: #1C1C1E; --accent: #FF9F0A;
            --green: #30D158; --red: #FF453A; --blue: #0A84FF;
            --text: #FFF; --text-sec: #8E8E93;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 12px 20px 12px;
        }

        .container { max-width: 400px; margin: auto; }
        
        .header-selectors { display: flex; gap: 10px; margin: 15px 0; }
        .header-selectors select { margin: 0; font-weight: 600; font-size: 16px; background: #2C2C2E; border: none; }

        .card {
            background: var(--card); padding: 15px; border-radius: 15px;
            margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .stats-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
        .stats-top > div { background: #2C2C2E; padding: 10px 5px; border-radius: 10px; }

        .label { font-size: 10px; color: var(--text-sec); text-transform: uppercase; margin-bottom: 4px; font-weight: 600;}
        .value-small { font-size: 15px; font-weight: 800; }
        
        .editable { border-bottom: 1px dashed #555; color: var(--accent); }

        input, select {
            width: 100%; box-sizing: border-box; background: #2C2C2E;
            border: 1px solid #3A3A3C; border-radius: 10px; color: #FFF;
            padding: 12px; margin: 5px 0 15px 0; font-size: 15px; outline: none;
            display: block; -webkit-appearance: none;
        }

        .main-btn {
            width: 100%; background: var(--accent); border: none;
            padding: 14px; border-radius: 12px; font-weight: 800; color: white; font-size: 16px;
        }

        .history-filter-btn {
            background: #3A3A3C; border: none; padding: 10px; border-radius: 10px;
            color: #FFF; font-size: 12px; font-weight: bold; width: 100%; margin-top: -5px; margin-bottom: 10px;
        }
        
        .summary-box { background: #2C2C2E; border-radius: 10px; padding: 12px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; font-weight: 600; }
        .summary-row:last-child { margin-bottom: 0; padding-top: 8px; border-top: 1px solid #3A3A3C; color: var(--green); }

        .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .tab { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #2C2C2E; color: var(--text-sec); font-size: 13px; font-weight: bold;}
        .tab.active { background: var(--card); color: #FFF; border: 1px solid var(--accent); }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td, th { padding: 12px 5px; border-bottom: 1px solid #333; text-align: left; }
        .historial-title { font-weight: 600; font-size: 14px; }
        .historial-sub { font-size: 11px; color: var(--text-sec); margin-top: 3px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-selectors">
        <select id="mesSel" onchange="actualizar()">
            <option value="01">Enero</option>
            <option value="02">Febrero</option>
            <option value="03">Marzo</option>
            <option value="04">Abril</option>
            <option value="05">Mayo</option>
            <option value="06">Junio</option>
            <option value="07">Julio</option>
            <option value="08">Agosto</option>
            <option value="09">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
        </select>
        <select id="yearSel" onchange="actualizar()">
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
            <option value="2029">2029</option>
        </select>
    </div>

    <div class="card stats-top">
        <div onclick="editarMeta()">
            <div class="label">Meta Mensual</div>
            <div class="value-small editable">$<span id="metaTxt">0</span></div>
        </div>
        <div>
            <div class="label">Vendido Hoy</div>
            <div class="value-small" id="v-hoy">$0</div>
        </div>
        <div>
            <div class="label">Comisiones</div>
            <div class="value-small" id="comisionesTxt" style="color: var(--green)">$0</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" id="t-control" onclick="switchTab('control')">Control</button>
        <button class="tab" id="t-historial" onclick="switchTab('historial')">Historial</button>
    </div>

    <div id="control">
        <div class="card">
            <div class="label" style="text-align: center; margin-bottom: 12px; font-size: 12px;">Nueva Entrada</div>
            
            <input type="date" id="f-in">
            
            <div class="label">Categoría del Servicio</div>
            <select id="cat-in" onchange="cargarServicios()">
                <option value="barra">Servicio de Barra</option>
                <option value="laboratorio">Servicio de Laboratorio</option>
            </select>

            <div class="label">¿Qué realizaste?</div>
            <select id="serv-in">
                </select>

            <button class="main-btn" onclick="addVenta()">Guardar Servicio</button>
        </div>

        <div class="card">
            <div class="summary-box">
                <div class="summary-row">
                    <span>Total Venta (Con 16% IVA):</span>
                    <span id="sum-con-iva">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Total Venta (Sin IVA):</span>
                    <span id="sum-sin-iva" style="color: var(--accent);">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Comisiones Totales (Aprox):</span>
                    <span id="sum-comisiones">$0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="historial" class="hidden">
        <div class="card">
            <div class="label" style="text-align: center; margin-bottom: 5px;">Filtrar Historial por Día</div>
            <input type="date" id="filtro-fecha" onchange="actualizarHistorial()">
            <button class="history-filter-btn" onclick="limpiarFiltroDia()">Ver Todo el Mes</button>
            
            <table id="tabla">
                <thead><tr><th>Fecha</th><th>Servicio Registrado</th><th style="text-align:right">Borrar</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const catalogo = {
        "barra": {
            servicios: [
                { nombre: "Configuraciones IOS", valor: 1229, comision: 45 },
                { nombre: "Restauración / Actualizacion IOS", valor: 1229, comision: 45 },
                { nombre: "Membresía SPA", valor: 2090, comision: 140 },
                { nombre: "Membresía Personal", valor: 3999, comision: 215 },
                { nombre: "Limpieza AirPods", valor: 919, comision: 15 }
            ]
        },
        "laboratorio": {
            servicios: [
                { nombre: "Próximamente...", valor: 0, comision: 0 }
            ]
        }
    };

    function cargarServicios() {
        const cat = document.getElementById('cat-in').value;
        const servSelect = document.getElementById('serv-in');
        servSelect.innerHTML = "";
        
        catalogo[cat].servicios.forEach((s, index) => {
            servSelect.innerHTML += `<option value="${index}">${s.nombre} (+ $${s.valor.toLocaleString()})</option>`;
        });
    }

    function getFechaLocal() {
        const d = new Date();
        const offset = d.getTimezoneOffset() * 60000; 
        return (new Date(d - offset)).toISOString().split('T')[0];
    }
    
    document.getElementById('f-in').value = getFechaLocal();

    const currentMonth = new Date().getMonth() + 1;
    document.getElementById('mesSel').value = currentMonth < 10 ? '0' + currentMonth : currentMonth;
    document.getElementById('yearSel').value = new Date().getFullYear().toString();

    cargarServicios(); 

    function getClaveMeta() { return `meta_${document.getElementById('yearSel').value}_${document.getElementById('mesSel').value}`; }
    function getClaveVentas() { return `ventas_${document.getElementById('yearSel').value}_${document.getElementById('mesSel').value}`; }

    function editarMeta() {
        let actual = localStorage.getItem(getClaveMeta()) || 42000;
        let nueva = prompt("Nueva meta mensual individual:", actual);
        if (nueva && !isNaN(nueva)) { localStorage.setItem(getClaveMeta(), nueva); actualizar(); }
    }

    function addVenta() {
        const f = document.getElementById('f-in').value;
        const cat = document.getElementById('cat-in').value;
        const servIndex = document.getElementById('serv-in').value;
        
        if (!servIndex) return;

        const servicioEscogido = catalogo[cat].servicios[servIndex];

        saveEntry({ 
            id: Date.now(), 
            f: f, 
            v: servicioEscogido.valor, 
            comision: servicioEscogido.comision,
            nombre: servicioEscogido.nombre,
        });
        
        const btn = document.querySelector('.main-btn');
        btn.innerText = "¡Guardado!";
        setTimeout(() => btn.innerText = "Guardar Servicio", 1500);
    }

    function saveEntry(obj) {
        let data = JSON.parse(localStorage.getItem(getClaveVentas())) || [];
        data.push(obj);
        localStorage.setItem(getClaveVentas(), JSON.stringify(data));
        actualizar();
    }

    function borrar(id) {
        if(!confirm("¿Borrar este registro?")) return;
        let data = JSON.parse(localStorage.getItem(getClaveVentas())) || [];
        data = data.filter(i => i.id !== id);
        localStorage.setItem(getClaveVentas(), JSON.stringify(data));
        actualizar();
    }

    function limpiarFiltroDia() {
        document.getElementById('filtro-fecha').value = "";
        actualizarHistorial();
    }

    function actualizar() {
        const metaActual = parseFloat(localStorage.getItem(getClaveMeta())) || 42000;
        const hoyLocal = getFechaLocal();
        document.getElementById('metaTxt').innerText = metaActual.toLocaleString();

        const data = JSON.parse(localStorage.getItem(getClaveVentas())) || [];
        
        const totalLogrado = data.reduce((acc, i) => acc + (i.v || 0), 0);
        const totalComisiones = data.reduce((acc, i) => acc + (i.comision || 0), 0);
        
        document.getElementById('comisionesTxt').innerText = "$" + totalComisiones.toLocaleString();
        const vendidoHoy = data.filter(i => i.f === hoyLocal).reduce((acc, i) => acc + (i.v || 0), 0);
        
        const vHoyTxt = document.getElementById('v-hoy');
        vHoyTxt.innerText = "$" + vendidoHoy.toLocaleString();
        vHoyTxt.style.color = vendidoHoy > 0 ? "var(--green)" : "var(--text)";

        // MATEMÁTICA CORREGIDA: Monto base tiene IVA -> Dividimos entre 1.16 para el neto sin IVA.
        const totalSinIva = totalLogrado / 1.16;
        document.getElementById('sum-con-iva').innerText = "$" + totalLogrado.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum-sin-iva').innerText = "$" + totalSinIva.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('sum-comisiones').innerText = "$" + totalComisiones.toLocaleString();

        actualizarHistorial();
    }

    function actualizarHistorial() {
        const data = JSON.parse(localStorage.getItem(getClaveVentas())) || [];
        const filtroDia = document.getElementById('filtro-fecha').value;
        const tbody = document.querySelector('#tabla tbody');
        tbody.innerHTML = "";

        // Filtrar datos según la fecha seleccionada en el historial (si la hay)
        let datosFiltrados = data;
        if (filtroDia) {
            datosFiltrados = data.filter(i => i.f === filtroDia);
        }

        datosFiltrados.sort((a,b) => new Date(b.f) - new Date(a.f)).forEach(i => {
            const fechaStr = i.f.split('-').reverse().slice(0,2).join('/');
            
            tbody.innerHTML += `<tr>
                <td style="color:var(--text-sec)">${fechaStr}</td>
                <td>
                    <div class="historial-title">${i.nombre || 'Servicio'}</div>
                    <div class="historial-sub">Meta (Con IVA): $${(i.v || 0).toLocaleString()} | <span style="color:var(--accent)">Sin IVA: $${((i.v || 0)/1.16).toFixed(2)}</span> <span style="color:var(--green)">| Com: $${(i.comision || 0).toLocaleString()}</span></div>
                </td>
                <td style="text-align:right"><button onclick="borrar(${i.id})" style="color:var(--red); border:none; background:none; font-size:16px;">X</button></td>
            </tr>`;
        });
    }

    function switchTab(t) {
        document.getElementById('control').classList.toggle('hidden', t !== 'control');
        document.getElementById('historial').classList.toggle('hidden', t !== 'historial');
        document.getElementById('t-control').classList.toggle('active', t === 'control');
        document.getElementById('t-historial').classList.toggle('active', t === 'historial');
        if(t === 'historial') { actualizarHistorial(); }
    }
    actualizar();
</script>
</body>
</html>
